# ========================
# TUN 模块
# ========================
tun:
  enable: true
  stack: gvisor
  device: utun
  endpoint-independent-nat: true
  auto-route: false
  auto-detect-interface: false
  auto-redirect: false
  strict-route: false

profile:
  store-selected: true
  store-fake-ip: true

# ========================
# 1. 策略组定义 (Proxy Groups)
# ========================
proxy-groups:
  # --- 应用服务分组 ---
  - name: Github
    type: select
    proxies: [节点选择, 美国-自动, 台湾-自动, 日本-自动, 新加坡-自动, 延迟选优]
    icon: https://fastly.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/github.svg

  - name: AI
    type: select
    proxies: [节点选择, 美国-自动, 台湾-自动, 日本-自动, 新加坡-自动, 延迟选优]
    icon: https://fastly.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/chatgpt.svg

  - name: Telegram
    type: select
    proxies: [节点选择, 新加坡-自动, 香港-自动, 延迟选优, 全局直连]
    icon: https://fastly.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/telegram.svg

  - name: YouTube
    type: select
    proxies: [节点选择, 香港-自动, 台湾-自动, 日本-自动, 延迟选优, 全局直连]
    icon: https://fastly.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/youtube.svg

  - name: Netflix
    type: select
    proxies: [节点选择, 新加坡-自动, 台湾-自动, 日本-自动, 香港-自动, 延迟选优, 全局直连]
    icon: https://fastly.jsdelivr.net/gh/xiaolin-007/clash@main/icon/netflix.svg

  - name: 谷歌服务
    type: select
    proxies: [节点选择, 香港-自动, 台湾-自动, 延迟选优, 全局直连]
    icon: https://fastly.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/google.svg

  - name: 苹果服务
    type: select
    proxies: [全局直连, 节点选择, 延迟选优]
    icon: https://fastly.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/apple.svg

  - name: 微软服务
    type: select
    proxies: [全局直连, 节点选择, 延迟选优]
    icon: https://fastly.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/microsoft.svg

  - name: TikTok
    type: select
    proxies: [节点选择, 台湾-自动, 日本-自动, 美国-自动, 延迟选优]
    icon: https://fastly.jsdelivr.net/gh/xiaolin-007/clash@main/icon/tiktok.svg

  - name: Spotify
    type: select
    proxies: [节点选择, 延迟选优, 全局直连]
    icon: https://fastly.jsdelivr.net/gh/xiaolin-007/clash@main/icon/spotify.svg

  - name: 全局直连
    type: select
    proxies: [DIRECT, 节点选择, 延迟选优]
    icon: https://fastly.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/link.svg

  - name: 漏网之鱼
    type: select
    proxies: [节点选择, 延迟选优, 全局直连]
    icon: https://fastly.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/fish.svg



  # --- 核心逻辑分组 ---
  - name: 节点选择
    type: select
    proxies:
      - 手动选择      # 新增：纯手动节点选择，放在第一位
      - 延迟选优
      - 故障转移
      - 香港-自动
      - 台湾-自动
      - 日本-自动
      - 新加坡-自动
      - 美国-自动
      - 其他-自动
    icon: https://fastly.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/adjust.svg

  - name: 手动选择
    type: select
    include-all: true # 自动拉取所有节点
    filter: "^((?!(直连|拒绝|官网|套餐|流量|异常|剩余|自动|故障|选择)).)*$" # 过滤掉非节点选项

  - name: 延迟选优
    type: url-test
    tolerance: 50
    interval: 300
    include-all: true
    filter: "^((?!(直连|拒绝|官网|套餐|流量|异常|剩余)).)*$"
    icon: https://fastly.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/speed.svg

  - name: 故障转移
    type: fallback
    interval: 300
    include-all: true
    filter: "^((?!(直连|拒绝|官网|套餐|流量|异常|剩余)).)*$"
    icon: https://fastly.jsdelivr.net/gh/clash-verge-rev/clash-verge-rev.github.io@main/docs/assets/icons/ambulance.svg

  # --- 地区自动测速 ---
  - {name: 香港-自动, type: url-test, include-all: true, tolerance: 50, interval: 300, filter: "(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*$"}
  - {name: 台湾-自动, type: url-test, include-all: true, tolerance: 50, interval: 300, filter: "(?=.*(广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan)).*$"}
  - {name: 日本-自动, type: url-test, include-all: true, tolerance: 50, interval: 300, filter: "(?=.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)).*$"}
  - {name: 新加坡-自动, type: url-test, include-all: true, tolerance: 50, interval: 300, filter: "(?=.*(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore)).*$"}
  - {name: 美国-自动, type: url-test, include-all: true, tolerance: 50, interval: 300, filter: "(?=.*(广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States)).*$"}
  - {name: 其他-自动, type: url-test, include-all: true, tolerance: 50, interval: 300, filter: "^((?!(直连|拒绝|广港|香港|HK|Hong Kong|🇭🇰|HongKong|广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan|广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan|广新|新加坡|SG|坡|狮城|🇸🇬|Singapore|广韩|韩国|韓國|KR|首尔|春川|🇰🇷|Korea|广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States|英国|UK)).)*$"}

